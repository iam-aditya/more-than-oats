<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>More Than Oats</title>
		<link rel="icon" type="image/jpeg" href="images/logo2.jpg">
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<!-- HEADER -->
		<header id="app-header">
			<button class="auth-icon-btn hidden" id="auth-icon-btn" onclick="openAuthSheet()" aria-label="Sign in">
				<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
					<circle cx="12" cy="7" r="4"/>
				</svg>
				<span class="auth-dot hidden" id="auth-dot"></span>
			</button>
			<div class="logo-wrap">
				<img src="images/logo2.jpg" alt="More Than Oats" class="logo-img" />
			</div>
			<button class="cart-icon-btn" id="cart-icon-btn" onclick="showCart()">
				<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="9" cy="21" r="1" />
					<circle cx="20" cy="21" r="1" />
					<path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
				</svg>
				<span class="cart-badge hidden" id="cart-badge">0</span>
			</button>
		</header>

		<!-- MENU VIEW -->
		<div id="menu-view">
			<div id="hero-carousel">
				<div id="carousel-track-wrap">
					<div id="carousel-track"></div>
				</div>
				<div id="carousel-dots"></div>
			</div>
			<div class="sticky-pills-wrap">
				<div class="category-pills" id="category-pills"></div>
			</div>
			<div id="offer-strip"></div>
			<div class="menu-list" id="menu-list"></div>
			<div class="menu-bottom-space"></div>
		</div>

		<!-- CART VIEW -->
		<div id="cart-view" class="hidden"></div>

		<!-- BOTTOM SHEET BACKDROP -->
		<div id="sheet-backdrop" class="hidden" onclick="closeSheet()"></div>

		<!-- BOTTOM SHEET -->
		<div id="item-sheet" class="hidden">
			<div class="sheet-handle-wrap" onclick="closeSheet()">
				<div class="sheet-handle"></div>
			</div>
			<div id="sheet-content" class="sheet-scroll"></div>
			<div class="sheet-footer">
				<button class="sheet-add-btn" id="sheet-add-btn" onclick="addFromSheet()">Add ₹0</button>
			</div>
		</div>

		<!-- AUTH SHEET BACKDROP -->
		<div id="auth-backdrop" class="hidden" onclick="closeAuthSheet()"></div>

		<!-- AUTH SHEET -->
		<div id="auth-sheet" class="hidden">
			<div class="sheet-handle-wrap" onclick="closeAuthSheet()">
				<div class="sheet-handle"></div>
			</div>
			<div id="auth-sheet-content"></div>
		</div>

		<!-- OFFER NUDGE (above cart bar) -->
		<div id="cart-nudge" class="hidden"></div>

		<!-- STICKY CART BAR -->
		<div id="cart-bar" class="hidden" onclick="showCart()">
			<div class="cart-bar-left">
				<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="9" cy="21" r="1" />
					<circle cx="20" cy="21" r="1" />
					<path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
				</svg>
				<span id="cart-bar-count">0 ITEM</span>
				<span id="cart-bar-price">₹0</span>
			</div>
			<span class="cart-bar-view">View Cart ›</span>
		</div>

		<div id="recaptcha-container"></div>
		<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
		<script src="script.js"></script>
	</body>
</html>
